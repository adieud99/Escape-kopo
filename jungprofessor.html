<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정원치 교수님 방 탈출</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#080808;
  font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
}

#scene {
  position:absolute;
  top:0; left:0;
  transform-origin:top left;
}

#bg {
  width:100%; height:100%;
  position:absolute; top:0; left:0;
  background:url('images/pro1.png') center center / cover no-repeat;
}

/* ════════════════════════════════════
   핫스팟
════════════════════════════════════ */
.hotspot {
  position:absolute;
  cursor:url('images/zoom1.png') 24 24, crosshair;
  z-index:50;
  border:3px solid transparent;
  border-radius:6px;
  transition:border-color .15s, background .15s;
}
.hotspot:hover {
  border-color:rgba(255,215,60,1);
  background:rgba(255,215,60,0.18);
  box-shadow:0 0 0 4px rgba(255,215,60,0.10);
}
.hotspot.taken {
  opacity:.15;
  pointer-events:none;
}

/* ════════════════════════════════════
   하단 인벤토리 바  (2줄 × 10칸)
   높이는 scene 1080px 기준 ~130px
════════════════════════════════════ */
#inventory {
  position:absolute;
  left:0; top:0;
  width:172px; height:100%;
  background:rgba(0,0,0,0.90);
  border-right:2px solid #3a2c18;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 10px 18px;
  gap:8px;
  z-index:100;
}
.inv-label {
  color:#c8933a;
  font-size:13px;
  font-weight:700;
  letter-spacing:4px;
  writing-mode:vertical-rl;
  flex-shrink:0;
  margin-bottom:6px;
}
.inv-divider {
  width:148px; height:2px;
  background:#3a2c18;
  flex-shrink:0;
  margin-bottom:4px;
}
.inv-grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:6px;
  width:148px;
}
.inv-slot {
  width:68px; height:68px;
  border:2px solid #3a2c18;
  border-radius:8px;
  background:rgba(255,255,255,0.03);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  overflow:hidden;
  transition:all .15s;
  position:relative;
  cursor:default;
}
.inv-slot::before {
  content:'';
  position:absolute; inset:0;
  border-radius:6px;
  background:linear-gradient(135deg, rgba(255,255,255,.04), transparent);
  pointer-events:none;
}
.inv-slot.filled {
  border-color:#c8933a;
  background:rgba(200,147,58,.16);
  cursor:pointer;
  box-shadow:0 0 10px rgba(200,147,58,.22);
}
.inv-slot.filled:hover {
  background:rgba(200,147,58,.30);
  transform:scale(1.06);
}
.inv-slot img {
  width:100%; height:100%;
  object-fit:cover;
  border-radius:6px;
}

/* ════════════════════════════════════
   왼쪽 상단: 위치 + 안내문
════════════════════════════════════ */
#hud-topleft {
  position:absolute;
  top:22px; left:190px;
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:12px;
}
#loc-badge {
  display:inline-flex;
  align-items:center;
  gap:12px;
  background:rgba(0,0,0,0.85);
  border:2px solid #c8933a;
  border-radius:30px;
  padding:12px 26px;
  color:#c8933a;
  font-size:20px;
  font-weight:700;
  white-space:nowrap;
}
.pdot {
  width:11px; height:11px;
  background:#c8933a;
  border-radius:50%;
  flex-shrink:0;
  animation:blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

#guide-msg {
  display:inline-block;
  background:rgba(0,0,0,0.78);
  border-left:5px solid #c8933a;
  color:#e8d5a8;
  font-size:17px;
  padding:11px 20px;
  border-radius:0 10px 10px 0;
}

/* ════════════════════════════════════
   오른쪽 상단: MAP
════════════════════════════════════ */
#hud-topright {
  position:absolute;
  top:22px; right:22px;
  z-index:100;
}
#map-toggle {
  display:flex;
  align-items:center;
  gap:9px;
  background:rgba(0,0,0,0.85);
  border:2px solid #5a9fc0;
  border-radius:12px;
  color:#8bc8e8;
  font-size:20px;
  font-weight:700;
  letter-spacing:2px;
  padding:14px 30px;
  cursor:pointer;
  font-family:inherit;
  transition:background .15s, box-shadow .15s;
  white-space:nowrap;
}
#map-toggle:hover {
  background:rgba(90,159,192,.20);
  box-shadow:0 0 18px rgba(90,159,192,.3);
}

#map-panel {
  display:none;
  position:absolute;
  top:64px; right:0;
  width:310px;
  background:rgba(6,5,3,0.97);
  border:2px solid #5a9fc0;
  border-radius:14px;
  padding:24px 20px;
  z-index:300;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
}
#map-panel.open { display:block; }
#map-panel h3 {
  color:#8bc8e8;
  font-size:17px;
  letter-spacing:2px;
  margin-bottom:18px;
  padding-bottom:11px;
  border-bottom:1px solid #1e2e3a;
}
.mroom {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:9px;
  margin-bottom:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid #222;
  color:#bbb;
  font-size:16px;
  cursor:pointer;
  transition:all .15s;
}
.mroom:hover { background:rgba(255,255,255,.12); color:#fff; border-color:#555; }
.mroom.here {
  background:rgba(200,147,58,.22);
  border-color:#c8933a;
  color:#f0d890;
  cursor:default;
}
.mroom.here:hover { background:rgba(200,147,58,.22); color:#f0d890; }
.mdot {
  width:11px; height:11px;
  border-radius:50%;
  background:#3a3a3a;
  flex-shrink:0;
}
.mroom.here .mdot { background:#c8933a; }
.mtag { margin-left:auto; font-size:13px; color:#555; }
.mroom.here .mtag { color:#c8933a; }

/* ════════════════════════════════════
   오른쪽 하단: 탈출 버튼
════════════════════════════════════ */
#btn-escape {
  position:absolute;
  bottom:28px; right:28px;
  z-index:100;
  display:flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(135deg,#7a1212,#cc2200);
  border:2px solid #ff3311;
  border-radius:12px;
  color:#fff;
  font-size:20px;
  font-weight:700;
  letter-spacing:2px;
  padding:16px 38px;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 0 20px rgba(200,40,0,.55);
  transition:all .15s;
  white-space:nowrap;
}
#btn-escape:hover {
  background:linear-gradient(135deg,#9a1818,#ee3311);
  box-shadow:0 0 38px rgba(200,40,0,.85);
  transform:translateY(-2px);
}

/* ════════════════════════════════════
   아이템 팝업
════════════════════════════════════ */
#popup {
  display:none;
  position:absolute; inset:0;
  background:rgba(0,0,0,0.80);
  z-index:200;
  align-items:center; justify-content:center;
}
#popup.show { display:flex; }
.pbox {
  background:#100e08;
  border:2px solid #c8933a;
  border-radius:16px;
  width:540px;
  padding:48px 48px 40px;
  text-align:center;
  box-shadow:0 0 60px rgba(200,147,58,.20);
}
#p-icon { font-size:72px; line-height:1; margin-bottom:18px; }
#p-icon img {
  width:110px; height:110px;
  object-fit:cover;
  border-radius:12px;
  border:2px solid #c8933a;
}
#p-title { color:#c8933a; font-size:24px; font-weight:700; margin-bottom:12px; }
#p-desc  { color:#f0e2c0; font-size:17px; line-height:1.95; margin-bottom:30px; white-space:pre-line; }
.pbtns   { display:flex; gap:14px; justify-content:center; }
.btn {
  padding:13px 36px; font-size:17px; font-weight:700;
  border-radius:9px; border:none; cursor:pointer; font-family:inherit;
  transition:all .12s;
}
.btn-take  { background:#c8933a; color:#100e08; }
.btn-take:hover { background:#e0a044; }
.btn-close { background:transparent; color:#888; border:2px solid #3a3a3a; }
.btn-close:hover { color:#ddd; border-color:#c8933a; }

/* 이미 획득한 아이템 팝업: 획득 버튼 숨김 */
#popup.view-mode .btn-take { display:none; }

/* ════════════════════════════════════
   탈출 팝업 — 비밀번호
════════════════════════════════════ */
#popup-esc {
  display:none;
  position:absolute; inset:0;
  background:rgba(0,0,0,0.86);
  z-index:250;
  align-items:center; justify-content:center;
}
#popup-esc.show { display:flex; }
.ebox {
  background:#080604;
  border:2px solid #cc2200;
  border-radius:16px;
  width:520px;
  padding:52px 46px 44px;
  text-align:center;
  box-shadow:0 0 60px rgba(200,40,0,.3);
}
.ebox h2   { color:#ff4422; font-size:28px; margin-bottom:11px; }
.ebox-sub  { color:#aaa; font-size:16px; line-height:1.85; margin-bottom:32px; }
.pw-row    { display:flex; justify-content:center; gap:14px; margin-bottom:18px; }
.pw-box {
  width:76px; height:86px;
  background:#130f0a;
  border:2px solid #3a3a3a;
  border-radius:11px;
  color:#f0d890;
  font-size:38px; font-weight:700;
  text-align:center;
  caret-color:#c8933a;
  font-family:inherit; outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.pw-box:focus {
  border-color:#c8933a;
  box-shadow:0 0 0 3px rgba(200,147,58,.25);
}
#pw-msg {
  color:#ff4422; font-size:16px; font-weight:600;
  height:26px; margin-bottom:26px;
}
.ebtns { display:flex; gap:14px; justify-content:center; }
.btn-go {
  background:linear-gradient(135deg,#7a1212,#cc2200);
  border:none; color:#fff;
  padding:16px 36px; font-size:18px; font-weight:700;
  border-radius:9px; cursor:pointer; font-family:inherit;
  box-shadow:0 0 14px rgba(200,40,0,.4);
}
.btn-go:hover { background:linear-gradient(135deg,#9a1818,#ee3311); }
.btn-back {
  background:transparent; color:#888;
  border:2px solid #3a3a3a;
  padding:16px 36px; font-size:18px; font-weight:700;
  border-radius:9px; cursor:pointer; font-family:inherit;
}
.btn-back:hover { color:#ddd; border-color:#888; }

/* ════════════════════════════════════
   탈출 성공 화면
════════════════════════════════════ */
#popup-success {
  display:none;
  position:absolute; inset:0;
  background:rgba(0,0,0,0.92);
  z-index:350;
  align-items:center; justify-content:center;
  flex-direction:column;
}
#popup-success.show { display:flex; }
.success-box {
  text-align:center;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
.success-emoji { font-size:100px; margin-bottom:24px; }
.success-title {
  color:#f0d890;
  font-size:46px; font-weight:700;
  margin-bottom:16px;
  text-shadow:0 0 40px rgba(200,147,58,.8);
}
.success-sub {
  color:#c8933a; font-size:22px;
  margin-bottom:40px; line-height:1.7;
}
.btn-restart {
  background:linear-gradient(135deg,#c8933a,#e0a044);
  border:none; color:#100e08;
  padding:16px 48px; font-size:20px; font-weight:700;
  border-radius:10px; cursor:pointer; font-family:inherit;
}
.btn-restart:hover { background:linear-gradient(135deg,#dfa848,#f0b850); }

/* 이동 토스트 */
#toast {
  position:absolute;
  bottom:60px; left:50%;
  transform:translateX(-50%);
  background:rgba(70,140,180,.96);
  color:#fff; font-size:18px; font-weight:700;
  padding:16px 36px; border-radius:36px;
  z-index:400; opacity:0; pointer-events:none;
  transition:opacity .3s; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#toast.show { opacity:1; }
</style>
</head>
<body>
<div id="scene">
  <div id="bg"></div>

  <!-- ═══════════════════════════════════════
       핫스팟 (원본 1536×864 기준 %)
       화분   : left:9.77%  top:23.73% w:4.56%  h:13.31%
       쪽지    : left:45.57% top:79.28% w:7.16%  h:6.37%
       사원증  : left:64.13% top:34.49% w:4.23%  h:20.83%
  ═══════════════════════════════════════ -->

  <!-- 화분 (왼쪽 창가 식물) -->
  <div class="hotspot"
       style="left:9.77%;top:23.73%;width:4.56%;height:13.31%"
       onclick="openItem('plant')"></div>

  <!-- 키보드 아래 쪽지 -->
  <div class="hotspot"
       style="left:45.57%;top:79.28%;width:7.16%;height:6.37%"
       onclick="openItem('note')"></div>

  <!-- 사원증 (오른쪽 파티션) -->
  <div class="hotspot"
       style="left:65.43%;top:34.14%;width:3.58%;height:21.41%"
       onclick="openItem('necklace')"></div>


  <!-- ════ 왼쪽 인벤토리 (2열×10행) ════ -->
  <div id="inventory">
    <div class="inv-label">아이템</div>
    <div class="inv-divider"></div>
    <div class="inv-grid" id="inv-grid"></div>
  </div>

  <!-- ════ 왼쪽 상단 HUD ════ -->
  <div id="hud-topleft">
    <div id="loc-badge"><span class="pdot"></span>📍 정원치 교수님 연구실</div>
    <div id="guide-msg">🔍 공간을 조사해 단서를 찾아보자</div>
  </div>

  <!-- ════ 오른쪽 상단 MAP ════ -->
  <div id="hud-topright">
    <button id="map-toggle" onclick="toggleMap()">🗺 MAP</button>
    <div id="map-panel">
      <h3>🗺 MAP — 이동하기</h3>
      <div class="mroom" onclick="goRoom('강의실')">
        <div class="mdot"></div>강의실<span class="mtag">→</span>
      </div>
      <div class="mroom" onclick="goRoom('장석주 교수님 연구실')">
        <div class="mdot"></div>장석주 교수님 연구실<span class="mtag">→</span>
      </div>
      <div class="mroom here">
        <div class="mdot"></div>정원치 교수님 연구실<span class="mtag">현재</span>
      </div>
      <div class="mroom" onclick="goRoom('휴게실')">
        <div class="mdot"></div>휴게실<span class="mtag">→</span>
      </div>
      <div class="mroom" onclick="goRoom('서버실')">
        <div class="mdot"></div>서버실<span class="mtag">→</span>
      </div>
    </div>
  </div>

  <!-- ════ 오른쪽 하단 탈출 ════ -->
  <button id="btn-escape" onclick="openEsc()">🚪 탈출</button>

  <!-- ════ 아이템 팝업 ════ -->
  <div id="popup">
    <div class="pbox">
      <div id="p-icon"></div>
      <div id="p-title"></div>
      <div id="p-desc"></div>
      <div class="pbtns">
        <button class="btn btn-take" onclick="takeItem()">획득</button>
        <button class="btn btn-close" onclick="closePopup()">닫기</button>
      </div>
    </div>
  </div>

  <!-- ════ 탈출 팝업 ════ -->
  <div id="popup-esc">
    <div class="ebox">
      <h2>🔐 탈출</h2>
      <p class="ebox-sub">문에 자물쇠가 걸려 있다.<br>4자리 비밀번호를 입력해야 탈출할 수 있다.</p>
      <div class="pw-row">
        <input class="pw-box" id="p0" maxlength="1" oninput="pi(0)" onkeydown="pk(event,0)">
        <input class="pw-box" id="p1" maxlength="1" oninput="pi(1)" onkeydown="pk(event,1)">
        <input class="pw-box" id="p2" maxlength="1" oninput="pi(2)" onkeydown="pk(event,2)">
        <input class="pw-box" id="p3" maxlength="1" oninput="pi(3)" onkeydown="pk(event,3)">
      </div>
      <div id="pw-msg"></div>
      <div class="ebtns">
        <button class="btn-go" onclick="tryEscape()">탈출한다</button>
        <button class="btn-back" onclick="closeEsc()">취소</button>
      </div>
    </div>
  </div>

  <!-- ════ 탈출 성공 화면 ════ -->
  <div id="popup-success">
    <div class="success-box">
      <div class="success-emoji">🎉</div>
      <div class="success-title">탈출 성공!</div>
      <div class="success-sub">비밀번호가 맞습니다.<br>폴리텍에서 탈출 성공했다!</div>
      <button class="btn-restart" onclick="location.reload()">다시 시작</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
/* ── 16:9 letterbox ── */
const scene = document.getElementById('scene');
const DW=1920, DH=1080;
function resize(){
  const s=Math.min(innerWidth/DW, innerHeight/DH);
  const ox=(innerWidth-DW*s)/2, oy=(innerHeight-DH*s)/2;
  scene.style.cssText=`width:${DW}px;height:${DH}px;transform:translate(${ox}px,${oy}px) scale(${s})`;
}
resize(); addEventListener('resize',resize);

/* ── 인벤토리 슬롯 20개 생성 ── */
const grid = document.getElementById('inv-grid');
for(let i=0;i<20;i++){
  const d=document.createElement('div');
  d.className='inv-slot';
  d.id='s'+i;
  grid.appendChild(d);
}

/* ── 아이템 데이터 ── */
const ITEMS = {
  plant:{
    t:'e', icon:'🪨', inv:'🪨',
    name:'교수님의 애완돌',
    desc:'매끄럽고 동그란 돌멩이.\n교수님이 화분 옆에 소중히 올려두었다.\n뒷면에 작게 "행운을 빌어" 라고 새겨져 있다.'
  },
  note:{
    t:'e', icon:'📝', inv:'📝',
    name:'숫자가 적힌 쪽지',
    desc:'키보드 밑에 끼워진 작은 메모지.\n\n「  0  」\n\n이 숫자가 비밀번호의 단서일까…'
  },
  necklace:{
    t:'i', icon:'images/pro2.jpg', inv:'images/pro2.jpg',
    name:'교수증',
    desc:'파티션에 걸린 목걸이.\n안에 교수증이 들어있다.\n정원치 교수님의 얼굴과 이름이 적혀있다.'
  }
};

const PW='0126';
let cur=null, col=[];

/* ── 아이템 팝업 열기 ── */
function showPopup(id, viewOnly){
  const d=ITEMS[id];
  document.getElementById('p-icon').innerHTML = d.t==='i'?`<img src="${d.icon}" alt="${d.name}">`:d.icon;
  document.getElementById('p-title').textContent=d.name;
  document.getElementById('p-desc').textContent=d.desc;
  const popup=document.getElementById('popup');
  if(viewOnly){
    popup.classList.add('view-mode');
  } else {
    popup.classList.remove('view-mode');
    cur=id;
  }
  popup.classList.add('show');
}

function openItem(id){
  if(col.includes(id)){
    // 이미 획득 → 설명만 보기
    showPopup(id, true);
    return;
  }
  showPopup(id, false);
}

function closePopup(){
  document.getElementById('popup').classList.remove('show','view-mode');
  cur=null;
}

function takeItem(){
  if(!cur) return;
  const d=ITEMS[cur], idx=col.length;
  col.push(cur);
  document.querySelectorAll('.hotspot').forEach(el=>{
    if(el.getAttribute('onclick')?.includes(cur)) el.classList.add('taken');
  });
  const slotId=cur; // 슬롯에 id 저장용
  const s=document.getElementById('s'+idx);
  if(s){
    s.innerHTML=d.t==='i'?`<img src="${d.inv}" alt="${d.name}" title="${d.name}">`:d.inv;
    s.title=d.name;
    s.dataset.itemId=cur;
    s.classList.add('filled');
    s.onclick=()=>openItem(s.dataset.itemId); // 클릭 시 설명 재표시
  }
  closePopup();
}

/* ── MAP ── */
function toggleMap(){ document.getElementById('map-panel').classList.toggle('open'); }
document.addEventListener('click',e=>{
  if(!document.getElementById('hud-topright').contains(e.target))
    document.getElementById('map-panel').classList.remove('open');
});
let tt;
function goRoom(r){
  document.getElementById('map-panel').classList.remove('open');
  const t=document.getElementById('toast');
  t.textContent=`📍 ${r} 으로 이동합니다…`;
  t.classList.add('show');
  clearTimeout(tt);
  tt=setTimeout(()=>t.classList.remove('show'),2300);
}

/* ── 탈출 팝업 ── */
function openEsc(){
  [0,1,2,3].forEach(i=>document.getElementById('p'+i).value='');
  document.getElementById('pw-msg').textContent='';
  document.getElementById('popup-esc').classList.add('show');
  setTimeout(()=>document.getElementById('p0').focus(),60);
}
function closeEsc(){ document.getElementById('popup-esc').classList.remove('show'); }

function pi(i){
  if(document.getElementById('p'+i).value.length===1 && i<3)
    document.getElementById('p'+(i+1)).focus();
}
function pk(e,i){
  if(e.key==='Backspace' && !document.getElementById('p'+i).value && i>0)
    document.getElementById('p'+(i-1)).focus();
  if(e.key==='Enter') tryEscape();
}
function tryEscape(){
  const pw=[0,1,2,3].map(i=>document.getElementById('p'+i).value).join('');
  if(pw.length<4){ document.getElementById('pw-msg').textContent='4자리를 모두 입력해주세요.'; return; }
  if(pw===PW){
    closeEsc();
    document.getElementById('popup-success').classList.add('show');
  } else {
    document.getElementById('pw-msg').textContent='🔒 비밀번호가 틀린 것 같다…';
    [0,1,2,3].forEach(i=>document.getElementById('p'+i).value='');
    document.getElementById('p0').focus();
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closePopup(); closeEsc(); }
});
</script>
